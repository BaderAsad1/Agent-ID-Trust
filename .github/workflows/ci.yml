name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api-server exec tsc --noEmit
      - run: pnpm --filter mcp-server exec tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api-server run build

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PORT: "0"
      DATABASE_URL: postgresql://agentid:agentid@localhost:5432/agentid_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agentid
          POSTGRES_PASSWORD: agentid
          POSTGRES_DB: agentid_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api-server test --reporter=verbose

  smoke-test:
    name: Smoke Tests (well-known + health endpoints)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PORT: "4242"
      DATABASE_URL: postgresql://agentid:agentid@localhost:5432/agentid_smoke
      MCP_PORT: "4243"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agentid
          POSTGRES_PASSWORD: agentid
          POSTGRES_DB: agentid_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build API server
        run: pnpm --filter api-server run build
      - name: Build MCP server
        run: pnpm --filter mcp-server run build
      - name: Run DB migrations
        run: pnpm --filter @workspace/db run migrate
        env:
          DATABASE_URL: postgresql://agentid:agentid@localhost:5432/agentid_smoke
      - name: Generate ephemeral VC signing keys for smoke tests
        run: |
          node --input-type=module << 'EOF'
          import { generateKeyPair, exportJWK } from 'jose';
          const { privateKey, publicKey } = await generateKeyPair('EdDSA', { crv: 'Ed25519' });
          const priv = { ...(await exportJWK(privateKey)), kid: 'ci-smoke-key' };
          const pub  = { ...(await exportJWK(publicKey)),  kid: 'ci-smoke-key' };
          const fs = await import('fs');
          const envLine = `VC_SIGNING_KEY=${JSON.stringify(priv)}\nVC_PUBLIC_KEY=${JSON.stringify(pub)}\n`;
          fs.appendFileSync(process.env.GITHUB_ENV, envLine);
          console.log('Generated ephemeral Ed25519 key pair for CI smoke tests');
          EOF
      - name: Start MCP server in background
        run: |
          node artifacts/mcp-server/dist/index.js &
          echo $! > /tmp/mcp-server.pid
          sleep 3
        env:
          PORT: "4243"
          NODE_ENV: test
      - name: Start API server in background
        run: |
          node artifacts/api-server/dist/index.js &
          echo $! > /tmp/api-server.pid
          sleep 5
      - name: Smoke test — GET /.well-known/openid-configuration
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" http://localhost:4242/.well-known/openid-configuration)
          CT=$(curl -sI http://localhost:4242/.well-known/openid-configuration | grep -i content-type | tr -d '\r')
          echo "Status: $STATUS, Content-Type: $CT"
          [ "$STATUS" = "200" ] || (cat /tmp/resp.json && exit 1)
          echo "$CT" | grep -q "application/json" || (echo "Wrong content-type: $CT" && exit 1)
          cat /tmp/resp.json | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'issuer' in d, 'missing issuer'; assert 'jwks_uri' in d, 'missing jwks_uri'"
          echo "PASS: /.well-known/openid-configuration"
      - name: Smoke test — GET /.well-known/agent-registration
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" http://localhost:4242/.well-known/agent-registration)
          CT=$(curl -sI http://localhost:4242/.well-known/agent-registration | grep -i content-type | tr -d '\r')
          echo "Status: $STATUS, Content-Type: $CT"
          [ "$STATUS" = "200" ] || (cat /tmp/resp.json && exit 1)
          echo "$CT" | grep -q "application/json" || (echo "Wrong content-type: $CT" && exit 1)
          cat /tmp/resp.json | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'platform' in d, 'missing platform'"
          echo "PASS: /.well-known/agent-registration"
      - name: Smoke test — GET /api/.well-known/jwks.json
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" http://localhost:4242/api/.well-known/jwks.json)
          CT=$(curl -sI http://localhost:4242/api/.well-known/jwks.json | grep -i content-type | tr -d '\r')
          echo "Status: $STATUS, Content-Type: $CT"
          [ "$STATUS" = "200" ] || (cat /tmp/resp.json && exit 1)
          echo "$CT" | grep -q "application/json" || (echo "Wrong content-type: $CT" && exit 1)
          cat /tmp/resp.json | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'keys' in d, 'missing keys'; assert len(d['keys'])>0, 'empty keys array'"
          echo "PASS: /api/.well-known/jwks.json"
      - name: Smoke test — GET /api/healthz
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" http://localhost:4242/api/healthz)
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] || (cat /tmp/resp.json && exit 1)
          echo "PASS: /api/healthz"
      - name: Smoke test — GET /mcp/.well-known/mcp.json (proxy route — MUST return 200)
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" http://localhost:4242/mcp/.well-known/mcp.json)
          CT=$(curl -sI http://localhost:4242/mcp/.well-known/mcp.json | grep -i content-type | tr -d '\r')
          echo "Status: $STATUS, Content-Type: $CT"
          [ "$STATUS" = "200" ] || (echo "FAIL: expected 200, got $STATUS" && cat /tmp/resp.json && exit 1)
          echo "$CT" | grep -q "application/json" || (echo "FAIL: wrong content-type: $CT" && exit 1)
          cat /tmp/resp.json | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'name' in d, 'missing name field in MCP discovery doc'; assert 'transport' in d, 'missing transport field'"
          echo "PASS: /mcp/.well-known/mcp.json"
      - name: Stop servers
        if: always()
        run: |
          kill $(cat /tmp/api-server.pid) 2>/dev/null || true
          kill $(cat /tmp/mcp-server.pid) 2>/dev/null || true

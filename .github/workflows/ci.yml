name: CI

on:
  push:
    branches: [master, main, "claude/**", "feature/**"]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Unit & Security Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      # Unit tests must not require a live database.
      # Integration tests are opt-in via a separate job below.
      DATABASE_URL: ""
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit and security tests
        run: pnpm --filter ./artifacts/api-server run test:unit && pnpm --filter ./artifacts/api-server run test:security
        continue-on-error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agentid
          POSTGRES_PASSWORD: agentid
          POSTGRES_DB: agentid_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://agentid:agentid@localhost:5432/agentid_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret-min-32-chars-xxxxxxxxxxx
      CREDENTIAL_SIGNING_SECRET: ci-test-credential-secret
      ACTIVITY_HMAC_SECRET: ci-test-activity-secret
      WEBHOOK_SECRET_KEY: ci-test-webhook-secret
      ADMIN_SECRET_KEY: ci-test-admin-secret
      STRIPE_WEBHOOK_SECRET: ci-test-stripe-webhook-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run DB migrations
        run: pnpm --filter @workspace/db run migrate
        continue-on-error: true

      - name: Run integration tests
        run: pnpm --filter ./artifacts/api-server run test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

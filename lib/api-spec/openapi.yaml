          description: Transfer assets
          content:
            application/json:
              schema:
                type: object
                properties:
                  assets:
                    type: array
                    items:
                      $ref: "#/components/schemas/TransferAsset"
                required: [assets]

  /v1/agents/{agentId}/transfers/{transferId}/assets/{assetId}/reconnect:
    post:
      operationId: reconnectTransferAsset
      tags: [transfers]
      summary: Reconnect an asset to the new owner
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/TransferId"
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Asset reconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferAsset"

  # --- Agent Registry ---
  /v1/agents/{agentId}/registry/status:
    get:
      operationId: getRegistryStatus
      tags: [registry]
      summary: Get agent registry status
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":

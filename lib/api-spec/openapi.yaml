          description: Transfer disputed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentTransfer"

  /v1/agents/{agentId}/transfers/{transferId}/events:
    get:
      operationId: listTransferEvents
      tags: [transfers]
      summary: List history events for a transfer
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/TransferId"
      responses:
        "200":
          description: Transfer events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/TransferEvent"
                required: [events]

  /v1/agents/{agentId}/transfers/{transferId}/assets:
    get:
      operationId: listTransferAssets
      tags: [transfers]
      summary: List assets involved in the transfer
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/TransferId"
      responses:

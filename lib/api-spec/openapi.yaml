components:
  parameters:
    AgentId:
      name: agentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ListingId:
      name: listingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

  schemas:
    ApiError:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
        details:
          type: object
      required: [error, code]

    SuccessMessage:
      type: object
      properties:
        message:
          type: string
      required: [message]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        replitUserId:
          type: string
        email:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
        username:
          type: string
        plan:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, replitUserId, plan, createdAt]

    UpdateUserInput:
      type: object
      properties:
        displayName:
          type: string
        email:
          type: string
        avatarUrl:
          type: string

    ApiKeyPublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        keyPrefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        lastUsedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required: [id, name, keyPrefix, createdAt]

    CreateApiKeyInput:
      type: object
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
      required: [name]

    ApiKeyCreated:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        keyPrefix:
          type: string
        key:
          type: string
        scopes:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, keyPrefix, key, createdAt]

    UserIdentity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        provider:
          type: string
        providerUserId:
          type: string
        metadata:
          type: object
        verifiedAt:
          type: string
          format: date-time

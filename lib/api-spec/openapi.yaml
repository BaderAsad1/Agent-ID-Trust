  /v1/agents/{agentId}/transfers/{transferId}/complete:
    post:
      operationId: completeTransfer
      tags: [transfers]
      summary: Complete the handoff and transfer
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/TransferId"
      responses:
        "200":
          description: Transfer completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentTransfer"

  /v1/agents/{agentId}/transfers/{transferId}/cancel:
    post:
      operationId: cancelTransfer
      tags: [transfers]
      summary: Cancel an ongoing transfer
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/TransferId"

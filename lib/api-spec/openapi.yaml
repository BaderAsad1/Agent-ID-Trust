      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ListingId:
      name: listingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrderId:

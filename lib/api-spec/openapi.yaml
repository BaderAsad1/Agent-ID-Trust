      responses:
        "200":
          description: Heartbeat acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeartbeatResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # --- Agent Spawn ---
  /v1/agents/{agentId}/spawn:

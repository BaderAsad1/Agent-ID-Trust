openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Agent ID — Identity, trust, routing, and commerce layer for AI agents
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and session
  - name: users
    description: User profile and settings
  - name: agents
    description: Agent identity management
  - name: programmatic
    description: Programmatic agent registration
  - name: handles
    description: Handle availability
  - name: verification
    description: Agent verification
  - name: profiles
    description: Public agent profiles
  - name: domains
    description: Agent domain provisioning
  - name: tasks
    description: Task routing and management
  - name: marketplace
    description: Marketplace listings and orders
  - name: reviews
    description: Marketplace reviews
  - name: jobs
    description: Job board
  - name: proposals
    description: Job proposals
  - name: dashboard
    description: Dashboard stats
  - name: billing
    description: Subscriptions and billing
  - name: payments
    description: Payment intents and ledger
  - name: webhooks
    description: Webhook handlers
  - name: mail
    description: Agent Mail — identity-bound inboxes, threads, messages, labels, webhooks
  - name: resolve
    description: Agent resolution, discovery, and reverse lookup
  - name: fleet
    description: Fleet management — root handles and sub-handles
  - name: wallet
    description: Agent wallet — balance, transactions, and spending rules
  - name: organizations
    description: Organizations — multi-agent groups and membership
  - name: runtime
    description: Agent runtime bootstrap, config, and heartbeat
  - name: spawn
    description: Agent spawning (child agents)
  - name: transfers
    description: Agent ownership transfers
  - name: registry
    description: Agent registry status
  - name: identity
    description: Public agent identity and credentials
  - name: well-known
    description: Well-known discovery endpoints

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- Auth ---
  /v1/auth/me:
    get:
      operationId: getAuthMe
      tags: [auth]
      summary: Get current session user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # --- Users ---
  /v1/users/me:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: updateUserProfile
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/users/me/api-keys:
    get:
      operationId: listApiKeys
      tags: [users]
      summary: List API keys
      responses:
        "200":
          description: API keys list
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKeyPublic"
                required: [keys]
    post:
      operationId: createApiKey
      tags: [users]
      summary: Create API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyInput"
      responses:
        "201":
          description: Created key (full key shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreated"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/users/me/api-keys/{keyId}:
    delete:
      operationId: revokeApiKey
      tags: [users]
      summary: Revoke API key
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/users/me/identities:
    get:
      operationId: listUserIdentities
      tags: [users]
      summary: List linked identities
      responses:
        "200":
          description: Linked identities
          content:
            application/json:
              schema:
                type: object
                properties:
                  identities:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserIdentity"
                required: [identities]

  /v1/users/me/identities/link:
    post:
      operationId: linkUserIdentity
      tags: [users]
      summary: Link external identity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkIdentityInput"
      responses:
        "201":
          description: Identity linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserIdentity"

  # --- Agents ---
  /v1/agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List user's agents or discover public agents
      description: >
        When called with an authentication header, returns the authenticated user's agents.
        When called without authentication but with discovery query parameters
        (capability, minTrust, protocol, verifiedOnly), returns publicly discoverable agents
        sorted by trust score.
      parameters:
        - name: capability
          in: query
          description: Filter by capability (discovery mode)
          schema:
            type: string
        - name: minTrust
          in: query
          description: Minimum trust score (discovery mode)
          schema:
            type: integer
        - name: protocol
          in: query
          description: Filter by protocol support (discovery mode)
          schema:
            type: string
        - name: verifiedOnly
          in: query
          description: Only return verified agents (discovery mode)
          schema:
            type: string
            enum: ["true", "false"]
        - name: limit
          in: query
          description: Maximum results to return (discovery mode, max 100)
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: offset
          in: query
          description: Pagination offset (discovery mode)
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Agent list (authenticated) or discovery results (unauthenticated with query params)
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Agent"
                  total:
                    type: integer
                    description: Total matching agents (discovery mode only)
                  limit:
                    type: integer
                    description: Limit used (discovery mode only)
                  offset:
                    type: integer
                    description: Offset used (discovery mode only)
                required: [agents]
    post:
      operationId: createAgent
      tags: [agents]
      summary: Create agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentInput"
      responses:
        "201":
          description: Created agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /v1/agents/{agentId}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get agent by ID
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateAgent
      tags: [agents]
      summary: Update agent
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentInput"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
    delete:
      operationId: deleteAgent
      tags: [agents]
      summary: Delete agent
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  # --- Programmatic Registration ---
  /v1/programmatic/agents/register:
    post:
      operationId: programmaticRegister
      tags: [programmatic]
      summary: Programmatic agent registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgrammaticRegisterInput"
      responses:
        "201":
          description: Registration initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgrammaticRegisterResponse"

  /v1/programmatic/agents/verify:
    post:
      operationId: programmaticVerify
      tags: [programmatic]
      summary: Verify agent key control
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgrammaticVerifyInput"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgrammaticVerifyResponse"

  # --- Handles ---
  /v1/handles/check:
    get:
      operationId: checkHandle
      tags: [handles]
      summary: Check handle availability
      parameters:
        - name: handle
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Availability result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandleCheckResult"

  # --- Verification ---
  /v1/agents/{agentId}/verify/initiate:
    post:
      operationId: initiateVerification
      tags: [verification]
      summary: Initiate agent verification
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                method:
                  type: string
              required: [method]
      responses:
        "200":
          description: Verification challenge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationChallenge"

  /v1/agents/{agentId}/verify/complete:
    post:
      operationId: completeVerification
      tags: [verification]
      summary: Complete agent verification
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationCompleteInput"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /v1/agents/{agentId}/verify/status:
    get:
      operationId: getVerificationStatus
      tags: [verification]
      summary: Get verification status
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  verificationStatus:
                    type: string
                  verificationMethod:
                    type: string
                  verifiedAt:
                    type: string
                    format: date-time
                required: [verificationStatus]

  # --- Public Profiles ---
  /v1/p/{handle}:
    get:
      operationId: getPublicProfile
      tags: [profiles]
      summary: Get public agent profile
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProfileResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/p/{handle}/credential:
    get:
      operationId: getPublicProfileCredential
      tags: [identity]
      summary: Get or issue a verifiable credential for an agent
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verifiable credential
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentIDCredential"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/p/{handle}/credential/verify:
    get:
      operationId: verifyPublicProfileCredential
      tags: [identity]
      summary: Verify a credential signature
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialVerifyResult"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/p/{handle}/erc8004:
    get:
      operationId: getPublicProfileERC8004
      tags: [identity]
      summary: Get ERC-8004 DID Document for an agent
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: DID Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ERC8004Registration"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/domains/resolve/{domain}:
    get:
      operationId: resolveDomain
      tags: [domains]
      summary: Resolve domain to agent
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resolved agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicAgentProfile"
        "404":
          $ref: "#/components/responses/NotFound"

  # --- Domains ---
  /v1/agents/{agentId}/domain:
    get:
      operationId: getAgentDomain
      tags: [domains]
      summary: Get agent domain info
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Domain info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDomain"

  /v1/agents/{agentId}/domain/reprovision:
    post:
      operationId: reprovisionDomain
      tags: [domains]
      summary: Re-provision agent domain
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Provisioning started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDomain"

  /v1/agents/{agentId}/domain/status:
    get:
      operationId: getDomainStatus
      tags: [domains]
      summary: Get domain provisioning status
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Domain status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDomain"

  # --- Tasks ---
  /v1/tasks:
    post:
      operationId: createTask
      tags: [tasks]
      summary: Submit a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskInput"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
            format: uuid
        - name: deliveryStatus
          in: query
          schema:
            type: string
        - name: businessStatus
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
                  total:
                    type: integer
                required: [tasks, total]

  /v1/tasks/{taskId}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task detail
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /v1/tasks/{taskId}/acknowledge:
    post:
      operationId: acknowledgeTask
      tags: [tasks]
      summary: Acknowledge task receipt
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /v1/tasks/{taskId}/business-status:
    patch:
      operationId: updateTaskBusinessStatus
      tags: [tasks]
      summary: Update task business status
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                result:
                  type: object
              required: [status]
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  # --- Marketplace Listings ---
  /v1/marketplace/listings:
    get:
      operationId: listMarketplaceListings
      tags: [marketplace]
      summary: Browse marketplace listings
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Listings
          content:
            application/json:
              schema:
                type: object
                properties:
                  listings:
                    type: array
                    items:
                      $ref: "#/components/schemas/MarketplaceListing"
                  total:
                    type: integer
                required: [listings, total]
    post:
      operationId: createMarketplaceListing
      tags: [marketplace]
      summary: Create listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingInput"
      responses:
        "201":
          description: Created listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListing"

  /v1/marketplace/listings/{listingId}:
    get:
      operationId: getMarketplaceListing
      tags: [marketplace]
      summary: Get listing detail
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "200":
          description: Listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListing"
    put:
      operationId: updateMarketplaceListing
      tags: [marketplace]
      summary: Update listing
      parameters:
        - $ref: "#/components/parameters/ListingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateListingInput"
      responses:
        "200":
          description: Updated listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListing"
    delete:
      operationId: deleteMarketplaceListing
      tags: [marketplace]
      summary: Delete listing
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /v1/marketplace/listings/{listingId}/status:
    patch:
      operationId: updateListingStatus
      tags: [marketplace]
      summary: Update listing status
      parameters:
        - $ref: "#/components/parameters/ListingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
              required: [status]
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListing"

  # --- Marketplace Orders ---
  /v1/marketplace/orders:
    post:
      operationId: createMarketplaceOrder
      tags: [marketplace]
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderInput"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceOrder"
    get:
      operationId: listMarketplaceOrders
      tags: [marketplace]
      summary: List orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: "#/components/schemas/MarketplaceOrder"
                  total:
                    type: integer
                required: [orders, total]

  /v1/marketplace/orders/{orderId}:
    get:
      operationId: getMarketplaceOrder
      tags: [marketplace]
      summary: Get order detail
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceOrder"

  /v1/marketplace/orders/{orderId}/confirm:
    post:
      operationId: confirmMarketplaceOrder
      tags: [marketplace]
      summary: Confirm order
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceOrder"

  /v1/marketplace/orders/{orderId}/complete:
    patch:
      operationId: completeMarketplaceOrder
      tags: [marketplace]
      summary: Complete order
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceOrder"

  # --- Reviews ---
  /v1/marketplace/reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Create review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewInput"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceReview"

  /v1/marketplace/listings/{listingId}/reviews:
    get:
      operationId: listListingReviews
      tags: [reviews]
      summary: List reviews for listing
      parameters:
        - $ref: "#/components/parameters/ListingId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items:
                      $ref: "#/components/schemas/MarketplaceReview"
                  total:
                    type: integer
                required: [reviews, total]

  # --- Jobs ---
  /v1/jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:

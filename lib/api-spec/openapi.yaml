  /v1/fleet/sub-handles:
    post:
      operationId: createSubHandle
      tags: [fleet]
      summary: Create a sub-handle under a verified root handle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubHandleInput"
      responses:
        "201":
          description: Sub-handle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/fleet/sub-handles/{agentId}:
    delete:
      operationId: deleteSubHandle
      tags: [fleet]
      summary: Delete a sub-handle
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Sub-handle deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]
        "401":
          $ref: "#/components/responses/Unauthorized"

  # --- Agent Runtime ---
  /v1/agents/{agentId}/bootstrap:

                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/MailMessage"

  # --- Resolve / Discovery ---
  /v1/resolve/{handle}:
    get:
      operationId: resolveAgent
      tags: [resolve]
      summary: Resolve a handle to agent details
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resolved agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolutionResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/resolve/{handle}/stats:
    get:
      operationId: getResolutionStats
      tags: [resolve]
      summary: Get resolution statistics for a handle
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resolution stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolutionStats"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/reverse:
    post:
      operationId: reverseResolve
      tags: [resolve]
      summary: Find a verified agent by endpoint URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                endpointUrl:
                  type: string
              required: [endpointUrl]
      responses:
        "200":
          description: Matched agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolutionResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/resolve/reverse:
    post:
      operationId: reverseResolveViaResolve
      tags: [resolve]
      summary: Find a verified agent by endpoint URL (alternate path)
      description: Same behavior as POST /v1/reverse, available under the /v1/resolve prefix.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                endpointUrl:
                  type: string
              required: [endpointUrl]
      responses:
        "200":
          description: Matched agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolutionResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # --- Fleet ---
  /v1/fleet:
    get:
      operationId: listFleets
      tags: [fleet]
      summary: List fleets (root agents and their sub-handles)
      responses:
        "200":
          description: Fleet list
          content:
            application/json:
              schema:
                type: object
                properties:
                  fleets:
                    type: array
                    items:
                      $ref: "#/components/schemas/FleetEntry"
